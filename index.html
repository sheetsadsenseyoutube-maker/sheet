<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment & Contact</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        h2 { color: #333; margin-bottom: 20px; }
        .qr-placeholder {
            width: 200px;
            height: 200px;
            background: #eee;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ccc;
        }
        .qr-placeholder img {
            max-width: 100%;
            border-radius: 10px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-insta {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
        }
        .btn-insta:hover { opacity: 0.9; transform: translateY(-2px); }
        .footer-text { font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>भुगतान और संपर्क</h2>
    
    <div class="qr-placeholder">
        <img src="qr-code.png" alt="Scan to Pay">
    </div>
    <p style="color: #666; font-size: 14px;">स्कैन करके पेमेंट करें</p>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <a href="https://ig.me/m/YOUR_INSTA_USERNAME" target="_blank" class="btn btn-insta">
        Instagram पर मेसेज करें
    </a>

    <p class="footer-text">सुरक्षित भुगतान | 24/7 सहायता</p>
</div>

</body>
</html>
